name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

defaults:
  run:
    working-directory: dev-workgraph-cli

jobs:
  verify:
    name: dev-workgraph-cli
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: REUSE / SPDX compliance
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: fsfe/reuse-action@bb774aa972c2a89ff34781233d275075cbddf542 # v5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.16"
          cache: npm
          cache-dependency-path: dev-workgraph-cli/package-lock.json

      # Lockfiles from macOS often omit @biomejs/cli-linux-x64; npm ci on Linux then
      # fails when npm scripts resolve node_modules/.bin/biome. Use standalone Biome.
      # https://github.com/npm/cli/issues/8106
      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2
        with:
          version: 2.5.1

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format check
        run: biome format src

      - name: Lint
        run: biome check src

      - name: Knip
        run: npm run knip

      - name: Test coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: CLI help
        run: node dist/cli.js --help

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
