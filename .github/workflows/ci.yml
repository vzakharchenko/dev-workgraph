name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

defaults:
  run:
    working-directory: dev-workgraph-cli

jobs:
  verify:
    name: dev-workgraph-cli
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.16"
          cache: npm
          cache-dependency-path: dev-workgraph-cli/package-lock.json

      # Lockfiles from macOS often omit @biomejs/cli-linux-x64; npm ci on Linux then
      # fails when npm scripts resolve node_modules/.bin/biome. Use standalone Biome.
      # https://github.com/npm/cli/issues/8106
      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2
        with:
          version: 2.5.1

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: biome format src

      - name: Lint
        run: biome check src

      - name: Knip
        run: npm run knip

      - name: Test coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: CLI help
        run: node dist/cli.js --help
